[pytest]
testpaths = tests
addopts = -ra -p no:cacheprovider
markers =
    live: hits live network APIs (MCP data sources); needs --runlive
    llm: calls the live LLM endpoint; needs --runllm (and PNNL_API_KEY)
    compute: builds/runs ELM on SLURM; needs --runcompute (and an salloc node)
    legacy: retired/superseded tests kept for reference; needs --runlegacy
