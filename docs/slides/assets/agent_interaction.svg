<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="7.5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#334155"/></marker>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7.5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#64748b"/></marker>
  </defs>

  <!-- lifeline headers -->
  <g text-anchor="middle" font-weight="700" font-size="13">
    <rect x="30"  y="30" width="120" height="40" rx="9" fill="#0f172a"/><text x="90"  y="55" fill="#fff">User</text>
    <rect x="210" y="30" width="130" height="40" rx="9" fill="#2c7fb8"/><text x="275" y="55" fill="#fff">Reception</text>
    <rect x="400" y="30" width="130" height="40" rx="9" fill="#fd8d3c"/><text x="465" y="55" fill="#fff">MCP tools</text>
    <rect x="595" y="30" width="120" height="40" rx="9" fill="#2c7fb8"/><text x="655" y="55" fill="#fff">Planner</text>
    <rect x="775" y="30" width="155" height="40" rx="9" fill="#31a354"/><text x="852" y="55" fill="#fff">Expander → ELM</text>
  </g>
  <!-- lifelines -->
  <g stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 4">
    <line x1="90"  y1="70" x2="90"  y2="575"/>
    <line x1="275" y1="70" x2="275" y2="575"/>
    <line x1="465" y1="70" x2="465" y2="575"/>
    <line x1="655" y1="70" x2="655" y2="575"/>
    <line x1="852" y1="70" x2="852" y2="575"/>
  </g>

  <g font-size="12" fill="#1e293b">
    <!-- 1 question -->
    <path d="M90,100 L271,100" stroke="#334155" stroke-width="2" marker-end="url(#a)"/>
    <text x="100" y="93" font-weight="600">1 · scientific question</text>

    <!-- agentic loop frame -->
    <rect x="250" y="118" width="250" height="78" rx="8" fill="none" stroke="#fd8d3c" stroke-width="1.3" stroke-dasharray="5 4"/>
    <rect x="250" y="118" width="92" height="18" rx="4" fill="#fd8d3c"/><text x="296" y="131" fill="#fff" font-size="10.5" font-weight="700" text-anchor="middle">agentic loop</text>
    <path d="M279,152 L461,152" stroke="#334155" stroke-width="2" marker-end="url(#a)"/>
    <text x="289" y="146" font-size="11">resolve watershed · sample DEM · soil · WTD</text>
    <path d="M461,180 L279,180" stroke="#64748b" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#ar)"/>
    <text x="289" y="174" font-size="11" fill="#475569">elevation · texture · wells · SNOTEL</text>

    <!-- 2 clarify -->
    <path d="M271,224 L94,224" stroke="#b45309" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#a)"/>
    <text x="100" y="217" fill="#b45309" font-weight="600">2 · clarify if ambiguous (with evidence)</text>

    <!-- 3 brief -->
    <path d="M279,262 L651,262" stroke="#334155" stroke-width="2.2" marker-end="url(#a)"/>
    <text x="300" y="255" font-weight="700">3 · framed brief (intent · domain · archetype)</text>

    <!-- 4 design (planner self) -->
    <path d="M655,288 h54 v34 h-50" fill="none" stroke="#2c7fb8" stroke-width="1.8" marker-end="url(#a)"/>
    <text x="715" y="300" font-size="11.5" fill="#1d5e85">4 · design strategy:</text>
    <text x="715" y="316" font-size="11.5" fill="#1d5e85">N · sampling · validation · validate</text>

    <!-- 5 strategy -> exec -->
    <path d="M655,348 L848,348" stroke="#334155" stroke-width="2.2" marker-end="url(#a)"/>
    <text x="600" y="341" font-weight="700">5 · sampling strategy (altitude only)</text>

    <!-- expansion loop frame (exec <-> MCP) -->
    <rect x="450" y="366" width="418" height="72" rx="8" fill="none" stroke="#8856a7" stroke-width="1.3" stroke-dasharray="5 4"/>
    <rect x="450" y="366" width="160" height="18" rx="4" fill="#8856a7"/><text x="530" y="379" fill="#fff" font-size="10.5" font-weight="700" text-anchor="middle">deterministic expansion</text>
    <path d="M848,400 L469,400" stroke="#334155" stroke-width="2" marker-end="url(#a)"/>
    <text x="500" y="394" font-size="11">sample_elevation_grid (bbox)</text>
    <path d="M469,424 L848,424" stroke="#64748b" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#ar)"/>
    <text x="500" y="418" font-size="11" fill="#475569">DEM grid → bands → allocate → columns.json</text>

    <!-- 6 build/run (exec self) -->
    <path d="M852,456 h44 v30 h-40" fill="none" stroke="#31a354" stroke-width="1.8" marker-end="url(#a)"/>
    <text x="700" y="468" font-size="11.5" fill="#217a3e" font-weight="600">6 · per-column build / clone (--keepexe)</text>
    <text x="700" y="484" font-size="11.5" fill="#217a3e" font-weight="600">+ srun on salloc node</text>

    <!-- 7 results -->
    <path d="M848,516 L94,516" stroke="#217a3e" stroke-width="2.2" marker-end="url(#a)"/>
    <text x="120" y="509" fill="#217a3e" font-weight="700">7 · per-column results + analysis (runoff · recharge · soil moisture · WTD)</text>
  </g>
</svg>
